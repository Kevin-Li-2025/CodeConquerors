groups:
  - name: accesscity-scalability
    rules:
      - alert: AccessCityHighErrorRate
        expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_server_request_duration_seconds_count[5m])), 1) > 0.01
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "AccessCity API 5xx rate is above 1%"
      - alert: AccessCityKafkaDeadLetters
        expr: increase(accesscity_kafka_messages_dead_lettered_total[10m]) > 0
        for: 1m
        labels:
          severity: ticket
        annotations:
          summary: "AccessCity Kafka messages are being routed to DLQ"
      - alert: AccessCityLowCacheHitRatio
        expr: sum(rate(accesscity_cache_hit_total[15m])) / clamp_min(sum(rate(accesscity_cache_hit_total[15m])) + sum(rate(accesscity_cache_miss_total[15m])), 1) < 0.70
        for: 20m
        labels:
          severity: ticket
        annotations:
          summary: "AccessCity shared cache hit ratio below 70%"
      - alert: AccessCitySafePathP95TooSlow
        expr: histogram_quantile(0.95, sum(rate(accesscity_route_safe_path_duration_milliseconds_bucket{http_route=~".*safe-path.*"}[5m])) by (le)) > 1500
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "AccessCity safe-path p95 latency is above 1.5s"
      - alert: AccessCityRouteCapacitySaturated
        expr: sum(rate(accesscity_route_computation_saturated_total[5m])) > 0.2
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "AccessCity route computation limiter is rejecting requests"
      - alert: AccessCityExternalDependencyFallbackSpike
        expr: sum(rate(accesscity_external_dependency_fallback_total[5m])) / clamp_min(sum(rate(accesscity_external_dependency_duration_milliseconds_count[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "AccessCity external dependency fallback rate is above 5%"
      - alert: AccessCityExternalDependencyCircuitOpened
        expr: increase(accesscity_external_dependency_circuit_opened_total[10m]) > 0
        for: 1m
        labels:
          severity: ticket
        annotations:
          summary: "AccessCity opened a circuit breaker for an external dependency"
