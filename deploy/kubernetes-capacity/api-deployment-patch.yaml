apiVersion: apps/v1
kind: Deployment
metadata:
  name: accesscity-api
spec:
  replicas: 10
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "750m"
              memory: "1536Mi"
            limits:
              cpu: "2500m"
              memory: "4Gi"
