apiVersion: apps/v1
kind: Deployment
metadata:
  name: accesscity-worker
spec:
  replicas: 30
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
